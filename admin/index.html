<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
  </head>
  <body class="admin-page-body">
    <main class="admin-page-shell">
      <section class="admin-panel">
        <header class="admin-header">
          <div>
            <p class="eyebrow">Panel de gestion</p>
            <h1 id="adminTitle">Inventario</h1>
          </div>
          <div class="connection-status" id="connectionStatus">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            Conectando
          </div>
          <div class="admin-actions">
            <button id="newProductBtn" class="primary-button" type="button">
              <i class="fa-solid fa-plus"></i>
              Nuevo producto
            </button>
            <button id="reloadProductsBtn" class="ghost-button" type="button">
              <i class="fa-solid fa-rotate-right"></i>
              Recargar
            </button>
            <a class="ghost-button" href="/">
              <i class="fa-solid fa-store"></i>
              Ver tienda
            </a>
          </div>
        </header>

        <section class="admin-workspace">
          <section class="admin-list-panel">
            <div class="admin-list-head">
              <div>
                <p class="eyebrow">Inventario</p>
                <h2>Lista de productos</h2>
              </div>
              <div class="admin-list-tools">
                <label class="admin-search">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <input id="adminSearchInput" type="search" placeholder="Buscar producto, categoria o marca" />
                </label>
                <div class="admin-status-tabs" aria-label="Estado de productos">
                  <button class="is-active" type="button" data-status-filter="active">Activos</button>
                  <button type="button" data-status-filter="all">Todos</button>
                  <button type="button" data-status-filter="hidden">Ocultos</button>
                  <button type="button" data-status-filter="low-stock">Stock bajo</button>
                </div>
              </div>
            </div>

            <div id="productListMount"></div>
            <div class="admin-pagination" aria-label="Paginacion de productos">
              <label>
                <span>Filas</span>
                <select id="adminRowsPerPage">
                  <option value="10" selected>10</option>
                  <option value="20">20</option>
                  <option value="30">30</option>
                  <option value="50">50</option>
                </select>
              </label>
              <span id="adminPageInfo">0 productos</span>
              <div>
                <button id="adminPrevPageBtn" type="button" aria-label="Pagina anterior">
                  <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button id="adminNextPageBtn" type="button" aria-label="Pagina siguiente">
                  <i class="fa-solid fa-chevron-right"></i>
                </button>
              </div>
            </div>
            <p id="manageStatus" class="form-status" role="status"></p>
          </section>

          <aside class="admin-side-panel">
            <div class="filter-panel admin-filter-panel is-open">
              <div class="side-panel-head">
                <button class="side-panel-toggle" type="button" data-side-toggle aria-expanded="true">
                  <span>Categorias</span>
                  <i class="fa-solid fa-chevron-down"></i>
                </button>
                <button id="newCategoryBtn" class="ghost-button icon-button" type="button" title="Nueva categoria"><i class="fa-solid fa-plus"></i></button>
              </div>
              <div id="categoryFilterList" class="category-filter-list"></div>
            </div>

            <div class="filter-panel admin-filter-panel is-open">
              <div class="side-panel-head">
                <button class="side-panel-toggle" type="button" data-side-toggle aria-expanded="true">
                  <span>Marcas</span>
                  <i class="fa-solid fa-chevron-down"></i>
                </button>
                <button id="newBrandBtn" class="ghost-button icon-button" type="button" title="Nueva marca"><i class="fa-solid fa-plus"></i></button>
              </div>
              <div id="brandFilterList" class="category-filter-list"></div>
            </div>
          </aside>
        </section>
      </section>

      <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
      <aside class="product-drawer" id="productDrawer" aria-hidden="true">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Inventario</p>
            <h2 id="drawerTitle">Nuevo producto</h2>
          </div>
          <button class="ghost-button" id="closeDrawerBtn" type="button">Cerrar</button>
        </div>
        <div id="productFormMount"></div>
      </aside>

      <aside class="product-drawer" id="categoryDrawer" aria-hidden="true">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Categorias</p>
            <h2 id="categoryDrawerTitle">Nueva categoria</h2>
          </div>
          <button class="ghost-button" id="closeCategoryDrawerBtn" type="button">Cerrar</button>
        </div>
        <div id="categoryFormMount"></div>
      </aside>

      <aside class="product-drawer" id="brandDrawer" aria-hidden="true">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Marcas</p>
            <h2 id="brandDrawerTitle">Nueva marca</h2>
          </div>
          <button class="ghost-button" id="closeBrandDrawerBtn" type="button">Cerrar</button>
        </div>
        <div id="brandFormMount"></div>
      </aside>
    </main>

    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
