<form class="product-form">
  <input name="id" type="hidden" />
  <label>
    Nombre de marca
    <input name="nombre" type="text" placeholder="Logitech" required />
  </label>
  <label class="check-row">
    <input name="activo" type="checkbox" checked />
    Marca activa
  </label>
  <button class="primary-button" type="submit">Guardar marca</button>
  <p class="form-status" role="status" data-status></p>
</form>
