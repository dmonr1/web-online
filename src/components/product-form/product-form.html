<form class="product-form">
  <input name="id" type="hidden" />
  <div class="form-grid">
    <label>Nombre <input name="nombre" type="text" required /></label>
    <label>Categoria <select name="categoria" data-category-select required></select></label>
    <label>Marca <select name="marca" data-brand-select required></select></label>
    <label>Precio <input name="precio" type="number" min="0" step="0.01" required /></label>
    <label>Stock <input name="stock" type="number" min="0" step="1" required /></label>
  </div>
  <div class="image-upload-box">
    <label>Imagen desde PC
      <input name="imagen_file" type="file" accept="image/*" data-image-file />
    </label>
    <div class="image-upload-preview">
      <img data-image-preview alt="Vista previa del producto" hidden />
      <span data-image-empty>Sin imagen cargada</span>
    </div>
    <p class="upload-status" data-upload-status></p>
  </div>
  <label>URL de imagen <input name="imagen_url" type="url" placeholder="https://..." data-image-url required /></label>
  <div class="extra-images-grid">
    <div class="extra-image-field">
      <label>Imagen 2 <input name="imagen_2_url" type="url" placeholder="https://..." /></label>
      <label class="file-mini">Archivo <input type="file" accept="image/*" data-extra-image-file data-target="imagen_2_url" /></label>
    </div>
    <div class="extra-image-field">
      <label>Imagen 3 <input name="imagen_3_url" type="url" placeholder="https://..." /></label>
      <label class="file-mini">Archivo <input type="file" accept="image/*" data-extra-image-file data-target="imagen_3_url" /></label>
    </div>
    <div class="extra-image-field">
      <label>Imagen 4 <input name="imagen_4_url" type="url" placeholder="https://..." /></label>
      <label class="file-mini">Archivo <input type="file" accept="image/*" data-extra-image-file data-target="imagen_4_url" /></label>
    </div>
    <div class="extra-image-field">
      <label>Imagen 5 <input name="imagen_5_url" type="url" placeholder="https://..." /></label>
      <label class="file-mini">Archivo <input type="file" accept="image/*" data-extra-image-file data-target="imagen_5_url" /></label>
    </div>
  </div>
  <label>Descripción <textarea name="descripcion" rows="4" required></textarea></label>
  <label class="check-row">
    <input name="activo" type="checkbox" checked />
    Producto activo en la tienda
  </label>
  <button class="primary-button" type="submit">Guardar producto</button>
  <p class="form-status" role="status" data-status></p>
</form>
