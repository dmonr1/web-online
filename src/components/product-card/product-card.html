<article class="product-card">
  <button class="favorite-button" type="button" data-favorite aria-label="Marcar como favorito">
    <i class="fa-regular fa-heart"></i>
  </button>
  <a class="product-media" data-detail-link>
    <img data-image alt="" loading="lazy" decoding="async" />
  </a>
  <div class="product-card-info">
    <span class="product-brand" data-brand></span>
    <h3 data-name></h3>
    <div class="product-card-bottom">
      <span class="price" data-price></span>
      <button class="add-button" type="button" data-add aria-label="Agregar producto al carrito">
        <i class="fa-solid fa-cart-plus"></i>
        <span>Agregar</span>
      </button>
    </div>
  </div>
</article>
