<aside class="cart-panel" id="carrito">
  <div class="cart-drawer-head">
    <div>
      <h2>Carrito</h2>
    </div>
  </div>
  <div class="cart-items" data-items></div>
  <div class="cart-total">
    <span>Total</span>
    <strong data-total>S/ 0.00</strong>
  </div>
  <div class="cart-panel-actions">
    <a class="whatsapp-button" href="/carrito/" data-checkout>
      <i class="fa-solid fa-bag-shopping"></i>
      Ir al carrito
    </a>
    <button class="ghost-button" type="button" data-clear>
      <i class="fa-solid fa-trash-can"></i>
      Limpiar
    </button>
  </div>
</aside>
